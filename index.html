<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen flex items-center justify-center">

<div class="bg-white w-[420px] rounded-2xl shadow-2xl p-5">

    <h1 class="text-xl font-bold text-center mb-4">🤖 AI Chatbot</h1>

    <div id="chatBox" class="h-[320px] overflow-y-auto bg-gray-100 p-3 rounded-lg space-y-2"></div>

    <div class="flex gap-2 mt-3">
        <input id="input" type="text" placeholder="Type message..."
            class="flex-1 px-3 py-2 border rounded-lg focus:outline-none">
        <button onclick="sendMessage()"
            class="bg-blue-600 text-white px-4 rounded-lg">Send</button>
    </div>

</div>

<script>
async function sendMessage() {
    const input = document.getElementById("input");
    const chatBox = document.getElementById("chatBox");

    const message = input.value;
    if (!message) return;

    // User message
    chatBox.innerHTML += `
        <div class="text-right">
            <span class="bg-blue-600 text-white px-3 py-1 rounded-lg break-words max-w-[80%] inline-block">${message}</span>
        </div>
    `;

    input.value = "";

    // Loading
    const id = "loading" + Date.now();
    chatBox.innerHTML += `
        <div id="${id}" class="text-left">
            <span class="bg-gray-300 px-3 py-1 rounded-lg">🤖 Thinking...</span>
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const res = await fetch("http://localhost:3000/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        document.getElementById(id).remove();

        chatBox.innerHTML += `
            <div class="text-left">
                <span class="bg-gray-300 px-3 py-2 rounded-lg whitespace-pre-line break-words max-w-[80%] inline-block">${data.reply}</span>
            </div>
        `;

    } catch {
        document.getElementById(id).remove();

        chatBox.innerHTML += `
            <div class="text-left">
                <span class="bg-red-300 px-3 py-1 rounded-lg">Error connecting server</span>
            </div>
        `;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
